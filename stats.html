<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vessel — Stats</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0C0C0C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="vessel">
  <link rel="manifest" href="manifest.json?v=7">
  <link rel="icon" type="image/png" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-512.png">

  <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
  <div id="auth-overlay" class="auth-overlay hidden">
    <div class="auth-card">
      <div class="auth-logo">vessel</div>
      <div class="auth-sub" id="auth-sub">Forge your discipline.</div>
      
      <form class="auth-form" id="auth-form">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="auth-email" class="auth-input" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label>Fun Password</label>
          <div class="pass-wrapper">
            <input type="password" id="auth-pass" class="auth-input" placeholder="••••••••" required>
            <div class="pass-emoji" id="pass-emoji">🤔</div>
          </div>
          <div class="pass-msg" id="pass-msg">Just type something. Or don't. I'm a sign, not a cop.</div>
        </div>
        <button type="submit" class="auth-btn" id="auth-submit-btn">Enter vessel</button>
      </form>

      <div class="auth-switch" id="auth-switch-text">
        New here? <span onclick="toggleAuthMode()">Create an account</span>
      </div>
    </div>
  </div>

  <div id="user-bar" class="user-bar hidden">
    <div id="user-email"></div>
    <div style="display:flex; gap:12px;">
      <div class="logout-btn" onclick="handleLogout()">Logout</div>
    </div>
  </div>

  <nav>
    <a href="index.html" class="nav-logo">vessel</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Workout</a>
      <a href="stats.html" class="nav-link active">Stats</a>
    </div>
  </nav>

  <div class="container" id="content">
    <div class="page-header">
      <div class="page-title">Your progress</div>
      <div class="page-sub">All your logged weights and gains</div>
    </div>

    <div id="summary-cards" class="stats-grid">
      <div class="stat-card"><div class="sc-label">Days logged</div><div class="sc-val">-</div></div>
      <div class="stat-card"><div class="sc-label">This week</div><div class="sc-val">-</div></div>
      <div class="stat-card"><div class="sc-label">Total volume</div><div class="sc-val">-</div></div>
      <div class="stat-card"><div class="sc-label">Exercises</div><div class="sc-val">-</div></div>
    </div>

    <div id="progress-section"></div>
    <div id="pr-section"></div>
    <div id="improved-section"></div>
    <div id="recent-section"></div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="stats.js"></script>
</body>
</html>
